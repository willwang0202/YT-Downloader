# Build YT-Downloader.exe (Windows) and YT-Downloader.app (macOS) on push of a version tag.
# Creates a GitHub Release and uploads the built files + YT-Downloader.py.
# From your Mac: git tag v3.0.1 && git push origin v3.0.1

name: Build release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Create Icon.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('Icon.png').convert('RGBA')
          size = 256
          canvas = Image.new('RGBA', (size, size), (0, 0, 0, 0))
          img.thumbnail((size, size), Image.LANCZOS)
          offset = ((size - img.width) // 2, (size - img.height) // 2)
          canvas.paste(img, offset, img)
          canvas.save('Icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: Build .exe
        run: >
          pyinstaller
          --name YT-Downloader
          --onefile
          --windowed
          --icon Icon.ico
          --add-data "web;web"
          --collect-all webview
          --collect-data imageio_ffmpeg
          YT-Downloader.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-windows
          path: dist/YT-Downloader.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Create Icon.icns
        run: |
          python3 -c "
          from PIL import Image
          img = Image.open('Icon.png').convert('RGBA')
          size = 1024
          canvas = Image.new('RGBA', (size, size), (0, 0, 0, 0))
          img.thumbnail((size, size), Image.LANCZOS)
          offset = ((size - img.width) // 2, (size - img.height) // 2)
          canvas.paste(img, offset, img)
          canvas.save('Icon1024.png')
          "
          mkdir -p Icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s Icon1024.png --out Icon.iconset/icon_${s}x${s}.png
            s2=$((s * 2))
            sips -z $s2 $s2 Icon1024.png --out Icon.iconset/icon_${s}x${s}@2x.png
          done
          iconutil -c icns Icon.iconset

      - name: Build .app
        run: >
          pyinstaller
          --name YT-Downloader
          --windowed
          --icon Icon.icns
          --add-data "web:web"
          --collect-all webview
          --collect-data imageio_ffmpeg
          YT-Downloader.py

      - name: Zip .app
        run: cd dist && zip -r YT-Downloader-mac.zip YT-Downloader.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-macos
          path: dist/YT-Downloader-mac.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: YT-Downloader-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: YT-Downloader-macos

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YT-Downloader.exe
            YT-Downloader-mac.zip
            YT-Downloader.py
          generate_release_notes: true
          body: |
            **Downloads**
            - **YT-Downloader.exe** — Windows (no Python needed)
            - **YT-Downloader-mac.zip** — macOS (unzip and open `YT-Downloader.app`)
            - **YT-Downloader.py** — Single script (Python 3.10+ required, auto-installs deps)

            **v3.0.0** — Rewritten as a native desktop app using pywebview (no browser needed).
            Files are saved directly to your chosen folder.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
