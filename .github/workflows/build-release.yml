# Build YT-Downloader.exe (Windows) and YT-Downloader.app (macOS) on push of a version tag.
# Creates a GitHub Release and uploads the built files + YT-Downloader.py.
# From your Mac: git tag v3.0.0 && git push origin v3.0.0

name: Build release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build .exe
        run: >
          pyinstaller
          --name YT-Downloader
          --onefile
          --windowed
          --add-data "web;web"
          --collect-all webview
          YT-Downloader.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-windows
          path: dist/YT-Downloader.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build .app
        run: >
          pyinstaller
          --name YT-Downloader
          --windowed
          --add-data "web:web"
          --collect-all webview
          YT-Downloader.py

      - name: Zip .app
        run: cd dist && zip -r YT-Downloader-mac.zip YT-Downloader.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: YT-Downloader-macos
          path: dist/YT-Downloader-mac.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: YT-Downloader-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: YT-Downloader-macos

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YT-Downloader.exe
            YT-Downloader-mac.zip
            YT-Downloader.py
          generate_release_notes: true
          body: |
            **Downloads**
            - **YT-Downloader.exe** — Windows (no Python needed)
            - **YT-Downloader-mac.zip** — macOS (unzip and open `YT-Downloader.app`)
            - **YT-Downloader.py** — Single script (Python 3.10+ required, auto-installs deps)

            **v3.0.0** — Rewritten as a native desktop app using pywebview (no browser needed).
            Files are saved directly to your chosen folder.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
